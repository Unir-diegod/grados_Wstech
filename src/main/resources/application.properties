spring.application.name=uni

# ============================================================
# DATASOURCE - MySQL (XAMPP)
# ============================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/wastech_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true&characterEncoding=UTF-8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

# ============================================================
# THYMELEAF
# ============================================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ============================================================
# INICIALIZACIÓN DE DATOS (data.sql)
# ============================================================
spring.sql.init.mode=always

# ============================================================
# SMTP - GMAIL (RECUPERACION DE CONTRASENA)
# ============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:wastech20@gmail.com}
spring.mail.password=${MAIL_PASSWORD:hjsvavizmekwveyi}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
