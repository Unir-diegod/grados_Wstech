<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wastech - Recuperar Contraseña</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2ECC71;
            --primary-dark: #27AE60;
            --bg-color: #1a1a2e;
            --panel-bg: rgba(255, 255, 255, 0.05);
            --text-main: #FFFFFF;
            --text-muted: #A0A0B0;
        }
        * { box-sizing: border-box; margin:0; padding:0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color:var(--text-main); display:flex; justify-content:center; align-items:center; height:100vh; }
        .login-container { background:var(--panel-bg); padding:32px; border-radius:12px; width:100%; max-width:420px; border:1px solid rgba(255,255,255,0.06); }
        h2 { color:var(--primary); margin-bottom:8px; }
        label { display:block; color:var(--text-muted); margin-bottom:6px; }
        input[type=email], input[type=password], .form-control { width:100%; padding:12px; border-radius:8px; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.06); color:var(--text-main); margin-bottom:12px; }
        .btn-submit { background:var(--primary); color:#fff; padding:12px 16px; border-radius:8px; border:none; cursor:pointer; }
        .btn-submit:hover { background:var(--primary-dark); }
        .link-muted { color:var(--text-muted); }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">Waste<span style="color:var(--text-main)">ch</span></div>
        <h2>Recuperar contraseña</h2>
        <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>
        <div th:if="${info}" class="alert alert-info" th:text="${info}"></div>

        <form th:action="@{/forgot-password}" method="post">
            <label for="email">Correo registrado</label>
            <input type="email" id="email" name="email" required />
            <button type="submit" class="btn-submit">Enviar código</button>
        </form>

        <div style="margin-top:14px; text-align:left;">
            <a th:href="@{/login}" class="link-muted" style="text-decoration:none;">Volver al login</a>
        </div>
    </div>
</body>
</html>
