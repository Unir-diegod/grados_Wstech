<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wastech - Recuperar Contraseña</title>
    <!-- Fuente moderna e Iconos -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --primary: #10B981;
            --primary-dark: #059669;
            --primary-gradient: linear-gradient(135deg, #10B981 0%, #059669 100%);
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --error: #ef4444;
            --info: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.04) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.04) 0px, transparent 50%);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            margin-bottom: 25px;
            text-align: center;
        }

        .logo img {
            width: 120px !important;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            padding: 5px;
            background: #ffffff;
            transition: all 0.3s ease;
            display: block;
            margin: 0 auto;
        }

        .logo img:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 25px rgba(16, 185, 129, 0.12);
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 24px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .input-wrapper i.icon-left {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 18px;
            transition: color 0.3s ease;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px 12px 44px;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-dark);
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        .input-wrapper:focus-within i.icon-left {
            color: var(--primary);
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: var(--primary-gradient);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.25);
            margin-bottom: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35);
            filter: brightness(1.05);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            line-height: 1.4;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--primary-dark);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error);
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: var(--info);
        }

        .back-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: color 0.3s;
            margin-top: 15px;
        }

        .back-link:hover {
            color: var(--primary-dark);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img th:src="@{/img/logo.jpeg}" alt="Wastech">
        </div>
        <h2>Recuperar contraseña</h2>
        <div class="subtitle">Ingresa tu correo para recibir las instrucciones</div>

        <div th:if="${exito}" class="alert alert-success">
            <i class="ph ph-check-circle" style="font-size: 20px;"></i>
            <span th:text="${exito}"></span>
        </div>
        <div th:if="${error}" class="alert alert-error">
            <i class="ph ph-warning-circle" style="font-size: 20px;"></i>
            <span th:text="${error}"></span>
        </div>
        <div th:if="${info}" class="alert alert-info">
            <i class="ph ph-info" style="font-size: 20px;"></i>
            <span th:text="${info}"></span>
        </div>

        <form th:action="@{/forgot-password}" method="post">
            <div class="form-group">
                <label for="email">Correo registrado</label>
                <div class="input-wrapper">
                    <i class="ph ph-envelope-simple icon-left"></i>
                    <input type="email" id="email" name="email" class="form-control" placeholder="ejemplo@correo.com" required autofocus>
                </div>
            </div>
            <button type="submit" class="btn-submit">
                Enviar código <i class="ph ph-paper-plane-tilt"></i>
            </button>
        </form>

        <a th:href="@{/login}" class="back-link">
            <i class="ph ph-arrow-left"></i> Volver al login
        </a>
    </div>
</body>
</html>
