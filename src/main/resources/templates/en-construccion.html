<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wastech - En Construcción</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2ECC71;
            --bg-color: #f4f7f6;
            --text-dark: #2c3e50;
            --text-light: #ffffff;
            --card-bg: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            height: 100vh;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .welcome-msg h1 {
            font-size: 28px;
            font-weight: 700;
        }

        .construction-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            padding: 60px 20px;
        }

        .construction-container h2 {
            font-size: 32px;
            color: var(--text-dark);
            margin-bottom: 15px;
        }

        .construction-container p {
            font-size: 16px;
            color: #7f8c8d;
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .construction-container .btn-back {
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.3s;
        }

        .construction-container .btn-back:hover {
            background: #27ae60;
        }

    </style>
</head>
<body>

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar(activePage='none')}"></div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <div class="welcome-msg">
                <h1>Módulo en Desarrollo</h1>
            </div>
        </div>

        <div class="construction-container">
            <div style="font-size: 64px; margin-bottom: 20px;">🛠️</div>
            <h2>Próximamente</h2>
            <p>Este módulo se encuentra actualmente en fase de diseño y desarrollo. Pronto estará disponible con todas sus funcionalidades para la gestión de Wastech.</p>
            <a th:href="@{/dashboard}" class="btn-back">Volver al Dashboard</a>
        </div>
    </div>

</body>
</html>
