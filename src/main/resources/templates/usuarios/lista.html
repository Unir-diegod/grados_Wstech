<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wastech - Gestión de Usuarios</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --primary: #2ECC71;
            --bg-color: #f4f7f6;
            --sidebar-bg: #1a1a2e;
            --text-dark: #2c3e50;
            --text-light: #ffffff;
            --card-bg: #ffffff;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --info: #3498db;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-dark); display: flex; height: 100vh; }

        .sidebar { width: 260px; background: var(--sidebar-bg); color: var(--text-light); display: flex; flex-direction: column; padding: 20px 0; }
        .logo { font-size: 24px; font-weight: 700; color: var(--primary); text-align: center; margin-bottom: 40px; }
        .logo span { color: var(--text-light); }
        .nav-item { padding: 15px 25px; color: #A0A0B0; text-decoration: none; display: block; transition: all 0.3s; }
        .nav-item:hover, .nav-item.active { background: rgba(255, 255, 255, 0.05); color: var(--text-light); border-left: 4px solid var(--primary); }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header h1 { font-size: 28px; font-weight: 700; }

        .btn { padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; text-decoration: none; display: inline-block; transition: 0.3s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #27AE60; }
        .btn-sm { padding: 5px 10px; font-size: 13px; border-radius: 4px; }
        .btn-info { background: var(--info); color: white; }
        .btn-warning { background: var(--warning); color: #333; }
        .btn-danger { background: var(--danger); color: white; }
        
        .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .alert-success { background: rgba(46, 204, 113, 0.1); border: 1px solid var(--primary); color: #27AE60; }
        .alert-error { background: rgba(231, 76, 60, 0.1); border: 1px solid var(--danger); color: var(--danger); }

        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .form-control { padding: 10px 15px; border: 1px solid #ddd; border-radius: 8px; width: 300px; }

        .table-container { background: var(--card-bg); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; color: #7f8c8d; }
        tr:hover { background: #fdfdfd; }
        .actions { display: flex; gap: 5px; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .badge-admin { background: rgba(241, 196, 15, 0.2); color: #f39c12; }
        .badge-cliente { background: rgba(52, 152, 219, 0.2); color: #2980b9; }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">Waste<span>ch</span></div>
        <div class="nav-items">
            <a th:href="@{/dashboard}" class="nav-item">Dashboard</a>
            <a th:href="@{/usuarios}" class="nav-item active">Usuarios</a>
            <a th:href="@{/clientes}" class="nav-item">Clientes</a>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Gestión de Usuarios</h1>
            <a th:href="@{/usuarios/nuevo}" class="btn btn-primary"><i class="ph ph-plus"></i> Nuevo Usuario</a>
        </div>

        <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="table-container">
            <form th:action="@{/usuarios}" method="get" class="search-bar">
                <input type="text" name="buscar" class="form-control" placeholder="Buscar por nombre o usuario..." th:value="${buscar}">
                <button type="submit" class="btn btn-primary"><i class="ph ph-magnifying-glass"></i> Buscar</button>
                <a th:href="@{/usuarios}" class="btn" style="background:#eee;color:#333;">Limpiar</a>
            </form>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre Completo</th>
                        <th>Username</th>
                        <th>Perfil</th>
                        <th>Asociado a</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${usuarios}">
                        <td th:text="${u.idusuario}">1</td>
                        <td th:text="${u.nombre + ' ' + u.apellido}">Juan Perez</td>
                        <td th:text="${u.usuario}">jperez</td>
                        <td>
                            <span th:class="${u.perfil.nombre == 'ADMINISTRADOR' ? 'badge badge-admin' : 'badge badge-cliente'}" 
                                  th:text="${u.perfil.nombre}">ADMIN</span>
                        </td>
                        <td th:text="${u.cliente != null ? u.cliente.nombre1 + ' ' + u.cliente.apellido1 : 'Ninguno'}">Cliente X</td>
                        <td class="actions">
                            <a th:href="@{/usuarios/ver/{id}(id=${u.idusuario})}" class="btn btn-sm btn-info" title="Ver Detalle"><i class="ph ph-eye"></i></a>
                            <a th:href="@{/usuarios/editar/{id}(id=${u.idusuario})}" class="btn btn-sm btn-warning" title="Editar"><i class="ph ph-pencil"></i></a>
                            <a th:href="@{/usuarios/eliminar/{id}(id=${u.idusuario})}" class="btn btn-sm btn-danger" title="Eliminar" onclick="return confirm('¿Estás seguro de eliminar este usuario?');"><i class="ph ph-trash"></i></a>
                        </td>
                    </tr>
                    <tr th:if="${usuarios == null || usuarios.empty}">
                        <td colspan="6" style="text-align: center; color: #7f8c8d; padding: 30px;">No se encontraron usuarios.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
