<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wastech - Restablecer Contraseña</title>
    <!-- Fuente moderna e Iconos -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --primary: #10B981;
            --primary-dark: #059669;
            --primary-gradient: linear-gradient(135deg, #10B981 0%, #059669 100%);
            --bg-color: #f8fafc;
            --panel-bg: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --error: #ef4444;
            --info: #3b82f6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.04) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.04) 0px, transparent 50%);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            margin-bottom: 25px;
            text-align: center;
        }

        .logo img {
            width: 120px !important;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            padding: 5px;
            background: #ffffff;
            transition: all 0.3s ease;
            display: block;
            margin: 0 auto;
        }

        .logo img:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 25px rgba(16, 185, 129, 0.12);
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 24px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }

        .input-wrapper i.icon-left {
            position: absolute;
            left: 14px;
            color: var(--text-muted);
            font-size: 18px;
            transition: color 0.3s ease;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px 12px 44px;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-dark);
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        .input-wrapper:focus-within i.icon-left {
            color: var(--primary);
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            padding: 0;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        .btn-submit {
            width: 100%;
            padding: 13px;
            background: var(--primary-gradient);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.25);
            margin-bottom: 10px;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.35);
            filter: brightness(1.05);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            line-height: 1.4;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--primary-dark);
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: var(--error);
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: var(--info);
        }

        .back-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: color 0.3s;
            margin-top: 15px;
        }

        .back-link:hover {
            color: var(--primary-dark);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img th:src="@{/img/logo.jpeg}" alt="Wastech">
        </div>
        <h2>Restablecer contraseña</h2>
        <div class="subtitle">Establece tu nueva contraseña de acceso</div>

        <!-- Alertas del backend -->
        <div th:if="${error}" class="alert alert-error" id="backendError">
            <i class="ph ph-warning-circle" style="font-size: 20px;"></i>
            <span th:text="${error}"></span>
        </div>
        <div th:if="${exito}" class="alert alert-success">
            <i class="ph ph-check-circle" style="font-size: 20px;"></i>
            <span th:text="${exito}"></span>
        </div>
        <div th:if="${info}" class="alert alert-info">
            <i class="ph ph-info" style="font-size: 20px;"></i>
            <span th:text="${info}"></span>
        </div>

        <!-- Alerta dinámica de JavaScript (inicialmente oculta) -->
        <div class="alert alert-error" id="jsError" style="display: none;">
            <i class="ph ph-warning-circle" style="font-size: 20px;"></i>
            <span id="jsErrorMsg"></span>
        </div>

        <form th:action="@{/reset-password}" method="post" id="resetForm">
            <!-- Código de recuperación (Solo si no está provisto en URL) -->
            <div th:if="${token} == null" class="form-group">
                <label for="token">Código de recuperación</label>
                <div class="input-wrapper">
                    <i class="ph ph-key icon-left"></i>
                    <input type="text" id="token" name="token" class="form-control" placeholder="Introduce el código de 6 dígitos" pattern="\d{6}" required />
                </div>
            </div>
            <div th:if="${token} != null">
                <input type="hidden" name="token" th:value="${token}" />
            </div>

            <!-- Nueva contraseña -->
            <div class="form-group">
                <label for="password">Nueva contraseña</label>
                <div class="input-wrapper">
                    <i class="ph ph-lock-key icon-left"></i>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Mínimo 6 caracteres" required />
                    <button type="button" class="toggle-password" onclick="togglePassword('password', 'eye1')" aria-label="Mostrar contraseña">
                        <i class="ph ph-eye" id="eye1"></i>
                    </button>
                </div>
            </div>

            <!-- Confirmar contraseña -->
            <div class="form-group">
                <label for="confirmPassword">Confirmar contraseña</label>
                <div class="input-wrapper">
                    <i class="ph ph-lock-key icon-left"></i>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" placeholder="Repite la contraseña" required />
                    <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', 'eye2')" aria-label="Mostrar contraseña">
                        <i class="ph ph-eye" id="eye2"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-submit">
                Actualizar contraseña <i class="ph ph-shield-check"></i>
            </button>
        </form>

        <a th:href="@{/login}" class="back-link">
            <i class="ph ph-arrow-left"></i> Volver al login
        </a>
    </div>

    <script>
        // Alternar visibilidad de contraseña
        function togglePassword(inputId, eyeId) {
            const input = document.getElementById(inputId);
            const eye = document.getElementById(eyeId);
            if (input.type === 'password') {
                input.type = 'text';
                eye.classList.remove('ph-eye');
                eye.classList.add('ph-eye-slash');
            } else {
                input.type = 'password';
                eye.classList.remove('ph-eye-slash');
                eye.classList.add('ph-eye');
            }
        }

        // Validación premium de contraseñas coincidentes sin alert nativo
        const form = document.getElementById('resetForm');
        form.addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const jsError = document.getElementById('jsError');
            const jsErrorMsg = document.getElementById('jsErrorMsg');
            const backendError = document.getElementById('backendError');

            if (backendError) {
                backendError.style.display = 'none'; // Ocultar error viejo del backend
            }

            if (password !== confirmPassword) {
                e.preventDefault();
                jsErrorMsg.innerText = "Las contraseñas no coinciden.";
                jsError.style.display = 'flex';
            } else if (password.length < 6) {
                e.preventDefault();
                jsErrorMsg.innerText = "La contraseña debe tener al menos 6 caracteres.";
                jsError.style.display = 'flex';
            } else {
                jsError.style.display = 'none';
            }
        });
    </script>
</body>
</html>
