<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wastech - Restablecer Contraseña</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2ECC71; --primary-dark:#27AE60; --bg-color:#1a1a2e; --panel-bg:rgba(255,255,255,0.05); --text-main:#FFFFFF; --text-muted:#A0A0B0; }
        * { box-sizing:border-box; margin:0; padding:0; font-family:'Inter',sans-serif }
        body { background-color:var(--bg-color); color:var(--text-main); display:flex; justify-content:center; align-items:center; height:100vh; }
        .login-container { background:var(--panel-bg); padding:32px; border-radius:12px; width:100%; max-width:420px; border:1px solid rgba(255,255,255,0.06); }
        h2 { color:var(--primary); margin-bottom:8px; }
        label { display:block; color:var(--text-muted); margin-bottom:6px; }
        input[type=email], input[type=password], .form-control { width:100%; padding:12px; border-radius:8px; background:rgba(0,0,0,0.2); border:1px solid rgba(255,255,255,0.06); color:var(--text-main); margin-bottom:12px; }
        .btn-submit { background:var(--primary); color:#fff; padding:12px 16px; border-radius:8px; border:none; cursor:pointer; }
        .btn-submit:hover{ background:var(--primary-dark); }
        .alert-error{ background: rgba(231,76,60,0.07); border:1px solid #E74C3C; color:#ff8b8b; padding:10px; border-radius:8px; margin-bottom:10px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo"><img th:src="@{/img/logo.jpeg}" alt="Wastech" style="width: 150px; height: auto; border-radius: 8px; margin: 0 auto; display: block;"></div>
        <h2>Restablecer contraseña</h2>
        <div th:if="${error}" class="alert-error" th:text="${error}"></div>
        <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>

        <form th:action="@{/reset-password}" method="post">
            <div th:if="${token} == null">
                <label for="token">Código de recuperación</label>
                <input type="text" id="token" name="token" placeholder="Introduce el código recibido" pattern="\\d{6}" required />
            </div>
            <div th:if="${token} != null">
                <input type="hidden" name="token" th:value="${token}" />
            </div>

            <label for="password">Nueva contraseña</label>
            <input type="password" id="password" name="password" required />

            <label for="confirmPassword">Confirmar contraseña</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required />

            <button type="submit" class="btn-submit">Actualizar contraseña</button>
        </form>
        <script>
            const form = document.querySelector('form');
            form.addEventListener('submit', function(e){
                const p = document.getElementById('password').value;
                const c = document.getElementById('confirmPassword').value;
                if(p !== c){
                    e.preventDefault();
                    alert('Las contraseñas no coinciden.');
                }
            });
        </script>

        <div style="margin-top:14px; text-align:left;">
            <a th:href="@{/login}" style="color:var(--text-muted); text-decoration:none;">Volver al login</a>
        </div>
    </div>
</body>
</html>
