<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wastech - Formulario de Cliente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --primary: #2ECC71;
            --bg-color: #f4f7f6;
            --sidebar-bg: #1a1a2e;
            --text-dark: #2c3e50;
            --text-light: #ffffff;
            --card-bg: #ffffff;
            --danger: #e74c3c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-dark); display: flex; height: 100vh; }

        .sidebar { width: 260px; background: var(--sidebar-bg); color: var(--text-light); display: flex; flex-direction: column; padding: 20px 0; }
        .logo { font-size: 24px; font-weight: 700; color: var(--primary); text-align: center; margin-bottom: 40px; }
        .logo span { color: var(--text-light); }
        .nav-item { padding: 15px 25px; color: #A0A0B0; text-decoration: none; display: block; transition: all 0.3s; }
        .nav-item:hover, .nav-item.active { background: rgba(255, 255, 255, 0.05); color: var(--text-light); border-left: 4px solid var(--primary); }

        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .header { margin-bottom: 40px; }
        .header h1 { font-size: 28px; font-weight: 700; margin-bottom: 10px;}

        .card { background: var(--card-bg); border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); max-width: 800px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group.full-width { grid-column: span 2; }
        
        label { display: block; font-size: 14px; font-weight: 600; color: #34495e; margin-bottom: 8px; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; transition: border 0.3s; }
        .form-control:focus { outline: none; border-color: var(--primary); }
        .error-msg { color: var(--danger); font-size: 12px; margin-top: 5px; display: block; }
        
        .btn { padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; border: none; text-decoration: none; display: inline-block; transition: 0.3s; font-size: 15px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #27AE60; }
        .btn-secondary { background: #95a5a6; color: white; margin-right: 10px;}
        .btn-secondary:hover { background: #7f8c8d; }
        
        .alert-error { background: rgba(231, 76, 60, 0.1); border: 1px solid var(--danger); color: var(--danger); padding: 15px; border-radius: 8px; margin-bottom: 20px;}

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><img th:src="@{/img/logo.jpeg}" alt="Wastech" style="width: 120px; height: auto; border-radius: 8px;"></div>
        <div class="nav-items">
            <a th:href="@{/dashboard}" class="nav-item">Dashboard</a>
            <a th:href="@{/usuarios}" class="nav-item">Usuarios</a>
            <a th:href="@{/clientes}" class="nav-item active">Clientes</a>
            <a th:href="@{/deshidratadores}" class="nav-item">Deshidratadores</a>
            <a th:href="@{/compostaje}" class="nav-item">Compostaje</a>
            <a th:href="@{/sensores}" class="nav-item">Sensores IoT</a>
            <a th:href="@{/reportes}" class="nav-item">Reportes</a>
            <a th:href="@{/configuracion}" class="nav-item">Configuración</a>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1 th:text="${edicion} ? 'Editar Cliente' : 'Nuevo Cliente'">Nuevo Cliente</h1>
            <a th:href="@{/clientes}" style="color: #7f8c8d; text-decoration: none;"><i class="ph ph-arrow-left"></i> Volver a la lista</a>
        </div>

        <div class="card">
            <div th:if="${error}" class="alert-error" th:text="${error}"></div>

            <form th:action="${edicion} ? @{/clientes/actualizar/{id}(id=${clienteDTO.cedula})} : @{/clientes}" 
                  th:object="${clienteDTO}" method="post">
                
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label for="cedula">Cédula / Identificación *</label>
                        <input type="text" id="cedula" th:field="*{cedula}" class="form-control" th:readonly="${edicion}" placeholder="Ej. 1234567890">
                        <span th:if="${#fields.hasErrors('cedula')}" th:errors="*{cedula}" class="error-msg"></span>
                    </div>

                    <div class="form-group">
                        <label for="nombre1">Primer Nombre *</label>
                        <input type="text" id="nombre1" th:field="*{nombre1}" class="form-control">
                        <span th:if="${#fields.hasErrors('nombre1')}" th:errors="*{nombre1}" class="error-msg"></span>
                    </div>

                    <div class="form-group">
                        <label for="nombre2">Segundo Nombre</label>
                        <input type="text" id="nombre2" th:field="*{nombre2}" class="form-control">
                        <span th:if="${#fields.hasErrors('nombre2')}" th:errors="*{nombre2}" class="error-msg"></span>
                    </div>

                    <div class="form-group">
                        <label for="apellido1">Primer Apellido *</label>
                        <input type="text" id="apellido1" th:field="*{apellido1}" class="form-control">
                        <span th:if="${#fields.hasErrors('apellido1')}" th:errors="*{apellido1}" class="error-msg"></span>
                    </div>

                    <div class="form-group">
                        <label for="apellido2">Segundo Apellido</label>
                        <input type="text" id="apellido2" th:field="*{apellido2}" class="form-control">
                        <span th:if="${#fields.hasErrors('apellido2')}" th:errors="*{apellido2}" class="error-msg"></span>
                    </div>

                    <div class="form-group">
                        <label for="telefono">Teléfono</label>
                        <input type="text" id="telefono" th:field="*{telefono}" class="form-control">
                        <span th:if="${#fields.hasErrors('telefono')}" th:errors="*{telefono}" class="error-msg"></span>
                    </div>

                    <div class="form-group">
                        <label for="correo">Correo Electrónico</label>
                        <input type="email" id="correo" th:field="*{correo}" class="form-control">
                        <span th:if="${#fields.hasErrors('correo')}" th:errors="*{correo}" class="error-msg"></span>
                    </div>

                    <div class="form-group full-width">
                        <label for="direccion">Dirección</label>
                        <input type="text" id="direccion" th:field="*{direccion}" class="form-control">
                        <span th:if="${#fields.hasErrors('direccion')}" th:errors="*{direccion}" class="error-msg"></span>
                    </div>
                </div>

                <div style="margin-top: 30px; text-align: right;">
                    <a th:href="@{/clientes}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary" th:text="${edicion} ? 'Actualizar Cliente' : 'Guardar Cliente'">Guardar</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
